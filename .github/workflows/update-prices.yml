name: Update Prices

# 매일 1회 자동 실행 + 수동 실행 버튼
on:
  schedule:
    # UTC 07:30 = KST 16:30 (한국장 마감 직후). 분/시는 UTC 기준.
    - cron: '30 7 * * 1-5'
  workflow_dispatch: {}   # Actions 탭에서 손으로도 돌릴 수 있음

# 저장소에 파일을 커밋하기 위한 권한
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pykrx

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
            exit 0
          fi
          git commit -m "Update prices ($(date -u +%Y-%m-%d))"
          # 충돌 안전 push: 최대 6회. 거부되면 진행 중이던 rebase를 취소하고
          # 원격 최신을 받은 뒤, 이 파일은 우리가 방금 만든 최신본으로 덮어써 재커밋한다.
          n=0
          until [ $n -ge 6 ]; do
            if git push; then
              echo "push 성공"
              exit 0
            fi
            n=$((n+1))
            echo "push 거부됨 — 원격 동기화 후 재시도 ($n/6)"
            # 혹시 멈춰 있을 수 있는 rebase/merge 상태를 깨끗이 정리
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true
            # 방금 만든 파일 내용을 임시 보관
            cp prices.json /tmp/prices.json.mine 2>/dev/null || true
            # 원격 최신으로 맞춤 (로컬 커밋은 버리고 원격 기준으로 리셋)
            git fetch origin main || true
            git reset --hard origin/main || true
            # 우리 최신 파일을 다시 덮어쓰고 커밋
            cp /tmp/prices.json.mine prices.json 2>/dev/null || true
            git add prices.json
            if git diff --staged --quiet; then
              echo "원격이 이미 최신 — 추가 변경 없음"
              exit 0
            fi
            git commit -m "Update prices ($(date -u +%Y-%m-%d), retry $n)"
            sleep 3
          done
          echo "6회 시도 후에도 push 실패"
          exit 1
